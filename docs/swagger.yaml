info:
  contact: {}
  description: Goen REST API (MVP scaffold). Includes health checks and connectivity
    probes.
  title: Goen API
  version: "0.1"
paths:
  /accounts:
    get:
      description: List accounts that the current user can access.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Account'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Create a new financial account for the current user.
      parameters:
      - description: Client instance ID (recommended)
        in: header
        name: X-Client-Id
        type: string
      - description: Create account request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Create account
      tags:
      - accounts
  /accounts/{accountId}:
    delete:
      description: Soft-delete an account (owner-only).
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Delete account
      tags:
      - accounts
    get:
      description: Get a single account (must be accessible to current user).
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Account'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Get account
      tags:
      - accounts
    patch:
      consumes:
      - application/json
      description: Update an account (owner-only). Supports name and status (active|closed).
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: string
      - description: Account patch
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.AccountPatch'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
