basePath: /api/v1
definitions:
  handlers.ConnectivityItem:
    properties:
      details:
        additionalProperties: {}
        type: object
      error:
        type: string
      ok:
        type: boolean
    type: object
  handlers.ConnectivityResponse:
    properties:
      postgres:
        $ref: '#/definitions/handlers.ConnectivityItem'
      redis:
        $ref: '#/definitions/handlers.ConnectivityItem'
    type: object
  handlers.HealthResponse:
    properties:
      checks:
        additionalProperties:
          type: string
        type: object
      status:
        type: string
    type: object
  handlers.PingResponse:
    properties:
      env:
        type: string
      request_id:
        type: string
      service:
        type: string
      time:
        type: string
    type: object
info:
  contact: {}
  description: Goen REST API (MVP scaffold). Includes health checks and connectivity
    probes.
  title: Goen API
  version: "0.1"
paths:
  /connectivity:
    get:
      description: Probes Postgres and Redis and returns diagnostic info.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConnectivityResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.ConnectivityResponse'
      summary: Connectivity probe
      tags:
      - meta
  /healthz:
    get:
      description: Liveness check for goen-api.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
      summary: Health check
      tags:
      - meta
  /ping:
    get:
      description: Lightweight endpoint for browser/app connectivity test.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PingResponse'
      summary: Ping
      tags:
      - meta
  /readyz:
    get:
      description: Readiness check; includes Postgres/Redis status when configured.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
      summary: Readiness check
      tags:
      - meta
schemes:
- http
- https
swagger: "2.0"
