basePath: /api/v1
definitions:
  apierror.Envelope:
    properties:
      error:
        $ref: '#/definitions/apierror.Error'
    type: object
  apierror.Error:
    properties:
      code:
        type: string
      details:
        additionalProperties: {}
        type: object
      message:
        type: string
    type: object
  domain.Account:
    properties:
      account_type:
        type: string
      client_id:
        type: string
      closed_at:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      currency:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      name:
        type: string
      parent_account_id:
        type: string
      status:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  domain.Category:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      parent_category_id:
        type: string
      sort_order:
        type: integer
      type:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  domain.Tag:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  domain.Transaction:
    properties:
      account_id:
        type: string
      amount:
        type: string
      client_id:
        type: string
      counterparty:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      currency:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      exchange_rate:
        type: string
      external_ref:
        type: string
      from_account_id:
        type: string
      id:
        type: string
      line_items:
        items:
          $ref: '#/definitions/domain.TransactionLineItem'
        type: array
      notes:
        type: string
      occurred_at:
        type: string
      occurred_date:
        type: string
      status:
        type: string
      tag_ids:
        items:
          type: string
        type: array
      to_account_id:
        type: string
      type:
        type: string
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  domain.TransactionLineItem:
    properties:
      amount:
        type: string
      category_id:
        type: string
      id:
        type: string
      note:
        type: string
    type: object
  domain.User:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      phone:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  handlers.ConnectivityItem:
    properties:
      details:
        additionalProperties: {}
        type: object
      error:
        type: string
      ok:
        type: boolean
    type: object
  handlers.ConnectivityResponse:
    properties:
      postgres:
        $ref: '#/definitions/handlers.ConnectivityItem'
      redis:
        $ref: '#/definitions/handlers.ConnectivityItem'
    type: object
  handlers.HealthResponse:
    properties:
      checks:
        additionalProperties:
          type: string
        type: object
      status:
        type: string
    type: object
  handlers.PingResponse:
    properties:
      env:
        type: string
      request_id:
        type: string
      service:
        type: string
      time:
        type: string
    type: object
  handlers.TransactionListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/domain.Transaction'
        type: array
      next_cursor:
        type: string
    type: object
  services.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      token_type:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  services.BudgetWithStats:
    properties:
      alert_threshold_percent:
        type: integer
      amount:
        type: string
      category_id:
        type: string
      created_at:
        type: string
      currency:
        type: string
      id:
        type: string
      name:
        type: string
      percent_used:
        type: integer
      period:
        type: string
      period_end:
        type: string
      period_start:
        type: string
      remaining:
        type: string
      rollover_mode:
        type: string
      spent:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  services.CreateAccountRequest:
    properties:
      account_type:
        type: string
      currency:
        type: string
      name:
        type: string
      parent_account_id:
        type: string
    type: object
  services.CreateBudgetRequest:
    properties:
      alert_threshold_percent:
        type: integer
      amount:
        type: string
      category_id:
        type: string
      currency:
        type: string
      name:
        type: string
      period:
        type: string
      period_end:
        type: string
      period_start:
        type: string
      rollover_mode:
        type: string
    type: object
  services.CreateCategoryRequest:
    properties:
      is_active:
        type: boolean
      name:
        type: string
      parent_category_id:
        type: string
      sort_order:
        type: integer
      type:
        type: string
    type: object
  services.CreateTagRequest:
    properties:
      color:
        type: string
      name:
        type: string
    type: object
  services.CreateTransactionLineItemRequest:
    properties:
      amount:
        type: string
      category_id:
        type: string
      note:
        type: string
    type: object
  services.CreateTransactionRequest:
    properties:
      account_id:
        type: string
      amount:
        type: string
      client_id:
        type: string
      counterparty:
        type: string
      currency:
        type: string
      description:
        type: string
      exchange_rate:
        type: string
      external_ref:
        type: string
      from_account_id:
        type: string
      line_items:
        items:
          $ref: '#/definitions/services.CreateTransactionLineItemRequest'
        type: array
      notes:
        type: string
      occurred_at:
        type: string
      occurred_date:
        type: string
      occurred_time:
        type: string
      tag_ids:
        items:
          type: string
        type: array
      to_account_id:
        type: string
      type:
        type: string
    type: object
  services.PatchTransactionRequest:
    properties:
      counterparty:
        type: string
      description:
        type: string
      notes:
        type: string
    type: object
  services.SigninRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  services.SignupRequest:
    properties:
      displayName:
        type: string
      email:
        type: string
      password:
        type: string
      phone:
        type: string
    type: object
info:
  contact: {}
  description: Goen REST API (MVP scaffold). Includes health checks and connectivity
    probes.
  title: Goen API
  version: "0.1"
paths:
  /accounts:
    get:
      description: List accounts that the current user can access.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Account'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Create a new financial account for the current user.
      parameters:
      - description: Client instance ID (recommended)
        in: header
        name: X-Client-Id
        type: string
      - description: Create account request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Create account
      tags:
      - accounts
  /accounts/{accountId}:
    get:
      description: Get a single account (must be accessible to current user).
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Account'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Get account
      tags:
      - accounts
  /auth/me:
    get:
      consumes:
      - application/json
      description: Get current logged in user information.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Get current user
      tags:
      - auth
  /auth/signin:
    post:
      consumes:
      - application/json
      description: Sign in with email/phone and password.
      parameters:
      - description: Client instance ID (recommended)
        in: header
        name: X-Client-Id
        type: string
      - description: Signin request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.SigninRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Signin
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user account (email or phone required).
      parameters:
      - description: Client instance ID (recommended)
        in: header
        name: X-Client-Id
        type: string
      - description: Signup request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.SignupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Signup
      tags:
      - auth
  /budgets:
    get:
      description: List budgets owned by current user; includes computed spent/remaining.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/services.BudgetWithStats'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: List budgets
      tags:
      - budgets
    post:
      consumes:
      - application/json
      description: Create a new budget owned by current user.
      parameters:
      - description: Create budget request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.CreateBudgetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.BudgetWithStats'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Create budget
      tags:
      - budgets
  /budgets/{budgetId}:
    get:
      description: Get a single budget owned by current user; includes computed spent/remaining.
      parameters:
      - description: Budget ID
        in: path
        name: budgetId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.BudgetWithStats'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Get budget
      tags:
      - budgets
  /categories:
    get:
      description: List categories accessible to current user (includes global default
        categories).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Category'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: List categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Create a new category owned by current user.
      parameters:
      - description: Create category request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Category'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Create category
      tags:
      - categories
  /categories/{categoryId}:
    get:
      description: Get a single category owned by current user.
      parameters:
      - description: Category ID
        in: path
        name: categoryId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Category'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Get category
      tags:
      - categories
  /connectivity:
    get:
      description: Probes Postgres and Redis and returns diagnostic info.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ConnectivityResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.ConnectivityResponse'
      summary: Connectivity probe
      tags:
      - meta
  /healthz:
    get:
      description: Liveness check for goen-api.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
      summary: Health check
      tags:
      - meta
  /ping:
    get:
      description: Lightweight endpoint for browser/app connectivity test.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PingResponse'
      summary: Ping
      tags:
      - meta
  /readyz:
    get:
      description: Readiness check; includes Postgres/Redis status when configured.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.HealthResponse'
      summary: Readiness check
      tags:
      - meta
  /tags:
    get:
      description: List tags owned by current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Tag'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: List tags
      tags:
      - tags
    post:
      consumes:
      - application/json
      description: Create a new tag owned by current user.
      parameters:
      - description: Create tag request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.CreateTagRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Tag'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Create tag
      tags:
      - tags
  /tags/{tagId}:
    get:
      description: Get a single tag owned by current user.
      parameters:
      - description: Tag ID
        in: path
        name: tagId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Tag'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Get tag
      tags:
      - tags
  /transactions:
    get:
      description: List transactions visible to current user; supports filtering by
        account and time range.
      parameters:
      - description: Filter by account id
        in: query
        name: account_id
        type: string
      - description: From (YYYY-MM-DD or RFC3339)
        in: query
        name: from
        type: string
      - description: To (YYYY-MM-DD or RFC3339)
        in: query
        name: to
        type: string
      - description: Cursor
        in: query
        name: cursor
        type: string
      - description: Limit (max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TransactionListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: List transactions
      tags:
      - transactions
    post:
      consumes:
      - application/json
      description: Create a new transaction (expense/income/transfer).
      parameters:
      - description: Client instance ID (recommended)
        in: header
        name: X-Client-Id
        type: string
      - description: Create transaction request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.CreateTransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Transaction'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Create transaction
      tags:
      - transactions
  /transactions/{transactionId}:
    delete:
      description: Soft delete a transaction.
      parameters:
      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Delete transaction
      tags:
      - transactions
    get:
      description: Get a single transaction if visible to current user.
      parameters:
      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Transaction'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.Envelope'
      summary: Get transaction
      tags:
      - transactions
    patch:
      consumes:
      - application/json
      description: 'Merge-patch transaction fields (MVP: description/notes/counterparty).'
      parameters:
      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: string
      - description: Patch transaction request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/services.PatchTransactionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Transaction'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierror.Envelope'
        "404":
          description: Not Found
          schema:
