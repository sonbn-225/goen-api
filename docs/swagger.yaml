host: api.goen.wisteria.local
info:
  contact: {}
  description: REST API for Goen Project
  title: Goen API
  version: "1.0"
paths:
  /accounts:
    get:
      description: Retrieve a list of accounts for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.AccountResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: List Accounts
      tags:
      - Accounts
    post:
      description: Create a new banking or manual account for the user
      parameters:
      - description: Account Creation Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/dto.AccountResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Create Account
      tags:
      - Accounts
  /accounts/{accountId}:
    delete:
      description: Delete an account (and its associated dependencies according to
        business rules)
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Delete Account
      tags:
