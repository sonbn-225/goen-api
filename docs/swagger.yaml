basePath: /api/v1
definitions:
  dto.AccountAuditEventResponse:
    properties:
      account_id:
        description: ID of the account the event relates to
        type: string
      action:
        description: Type of action (e.g., "create", "update")
        type: string
      actor_user_id:
        description: ID of the user who performed the action
        type: string
      diff:
        additionalProperties: {}
        description: Detailed field changes (old vs new)
        type: object
      entity_id:
        description: ID of the modified entity record
        type: string
      entity_type:
        description: Type of entity (always "account")
        type: string
      id:
        description: Unique identifier for the audit event
        type: string
      occurred_at:
        description: Timestamp when the event occurred
        type: string
    type: object
  dto.AccountResponse:
    properties:
      account_number:
        description: Account number
        type: string
      account_type:
        allOf:
        - $ref: '#/definitions/entity.AccountType'
        description: Type of account
      balance:
        description: Current account balance (decimal string)
        type: string
      currency:
        description: Primary currency
        type: string
      id:
        description: Unique account identifier
        type: string
      name:
        description: Account name
        type: string
      parent_account_id:
        description: ID of the parent account
        type: string
      settings:
        allOf:
        - $ref: '#/definitions/dto.AccountSettingsResponse'
        description: Specialized configuration (JSON)
      status:
        allOf:
        - $ref: '#/definitions/entity.AccountStatus'
        description: Current account status
    type: object
  dto.AccountSettingsRequest:
    properties:
      color:
        description: Account UI Color
        type: string
      investment:
        allOf:
        - $ref: '#/definitions/dto.InvestmentSettingsRequest'
        description: Brokerage specific configuration
      savings:
        allOf:
        - $ref: '#/definitions/dto.SavingsSettingsRequest'
        description: Savings goal specific configuration
    type: object
  dto.AccountSettingsResponse:
    properties:
      color:
        description: Account UI Color
        type: string
      investment:
        allOf:
        - $ref: '#/definitions/dto.InvestmentSettingsResponse'
        description: Brokerage specific configuration
      savings:
        allOf:
        - $ref: '#/definitions/dto.SavingsSettingsResponse'
        description: Savings goal specific configuration
    type: object
  dto.AccountShareResponse:
    properties:
      account_id:
        description: ID of the shared account
        type: string
      created_at:
        description: Timestamp when the share was created
        type: string
      id:
        description: Unique identifier for the share record
        type: string
      permission:
        allOf:
        - $ref: '#/definitions/entity.AccountSharePermission'
        description: Current permission level
      revoked_at:
        description: Timestamp when access was revoked
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entity.AccountShareStatus'
        description: Current sharing status (active/revoked)
      updated_at:
        description: Timestamp of the last update
        type: string
      user_display_name:
        description: Display name of the shared-to user (enriched)
        type: string
      user_email:
        description: Email of the shared-to user (enriched)
        type: string
      user_id:
        description: ID of the user access is shared with
        type: string
      user_phone:
        description: Phone of the shared-to user (enriched)
        type: string
    type: object
  dto.AuthResponse:
    properties:
      access_token:
        description: JWT access token for API authorization
        type: string
      expires_in:
        description: Access token duration in seconds
        type: integer
      refresh_token:
        description: Token used to get a new access token
        type: string
      token_type:
        description: Type of token (e.g., "Bearer")
        type: string
      user:
        allOf:
        - $ref: '#/definitions/dto.UserResponse'
        description: Authenticated user profile information
    type: object
  dto.BatchPatchRequest:
    properties:
      mode:
        description: Update mode (e.g., "merge" or "replace" tags)
        type: string
      patch:
        allOf:
        - $ref: '#/definitions/dto.TransactionPatchRequest'
        description: Changes to apply to all selected transactions
      transaction_ids:
        description: List of transactions to update
        items:
          type: string
        type: array
    type: object
  dto.BatchPatchResult:
    properties:
      failed_count:
        description: Number of failed updates
        type: integer
      failed_ids:
        description: IDs of records that failed to update
        items:
          type: string
        type: array
      mode:
        description: The update mode used
        type: string
      updated_count:
        description: Number of successful updates
        type: integer
      updated_ids:
        description: IDs of successfully updated records
        items:
          type: string
        type: array
    type: object
  dto.BudgetWithStatsResponse:
    properties:
      alert_threshold_percent:
        description: Alert threshold percentage
        type: integer
      amount:
        description: Total budget amount
        type: string
      category_id:
        description: ID of the tracked category
        type: string
      id:
        description: Unique budget identifier
        type: string
      name:
        description: Budget name
        type: string
      percent_used:
        description: Percentage of budget already spent
        type: integer
      period:
        allOf:
        - $ref: '#/definitions/entity.BudgetPeriod'
        description: Budget period type
      period_end:
        description: Current period end date
        type: string
      period_start:
        description: Current period start date
        type: string
      remaining:
        description: Amount left in the budget
        type: string
      rollover_mode:
        allOf:
        - $ref: '#/definitions/entity.BudgetRolloverMode'
        description: Rollover configuration
      spent:
        description: Total amount spent in the current period
        type: string
      user_id:
        description: ID of the user who owns the budget
        type: string
    type: object
  dto.CategoryResponse:
    properties:
      color:
        description: UI color representation in hex
        type: string
      icon:
        description: Icon name for UI display
        type: string
      id:
        description: Unique category identifier
        type: string
      is_active:
        description: Whether the category can be used for new transactions
        type: boolean
      key:
        description: Stable identifier key (e.g., "food")
        type: string
      parent_category_id:
        description: ID of the parent category
        type: string
      parent_key:
        description: Key of the parent category
        type: string
      sort_order:
        description: Display order in UI
        type: integer
      type:
        allOf:
        - $ref: '#/definitions/entity.CategoryType'
        description: Income or Expense
    type: object
  dto.ContactResponse:
    properties:
      avatar_url:
        description: URL to contact's avatar
        type: string
      email:
        description: Email address
        type: string
      id:
        description: Unique contact identifier
        type: string
      linked_avatar_url:
        description: Avatar URL of the linked user (enriched)
        type: string
      linked_display_name:
        description: Display name of the linked user (enriched)
        type: string
      linked_user_id:
        description: ID of the platform user this contact is linked to
        type: string
      name:
        description: Name of the contact
        type: string
      notes:
        description: Private notes
        type: string
      phone:
        description: Phone number
        type: string
      user_id:
        description: ID of the user who owns this contact
        type: string
    type: object
  dto.CreateAccountRequest:
    properties:
      account_number:
        description: Optional account number
        type: string
      account_type:
        description: Type of account (e.g., "bank", "wallet")
        type: string
      currency:
        description: Primary currency code (e.g., "VND", "USD")
        type: string
      name:
        description: Name of the account (e.g., "Main Savings")
        type: string
      parent_account_id:
        description: ID of the parent account (for sub-accounts)
        type: string
      settings:
        allOf:
        - $ref: '#/definitions/dto.AccountSettingsRequest'
        description: Optional specialized settings for the account
    type: object
  dto.CreateBudgetRequest:
    properties:
      alert_threshold_percent:
        description: Percentage of spending that triggers an alert
        type: integer
      amount:
        description: Total amount allowed for the period (decimal string)
        type: string
      category_id:
        description: ID of the category this budget tracks
        type: string
      name:
        description: Optional descriptive name for the budget
        type: string
      period:
        allOf:
        - $ref: '#/definitions/entity.BudgetPeriod'
        description: Recurrence period (monthly, weekly, etc.)
      period_end:
        description: Optional fixed end date for the budget
        type: string
      period_start:
        description: Start date of the first period (YYYY-MM-DD)
        type: string
      rollover_mode:
        allOf:
        - $ref: '#/definitions/entity.BudgetRolloverMode'
        description: How to handle unused funds in the next period
    required:
    - amount
    - period
    type: object
  dto.CreateContactRequest:
    properties:
      avatar_url:
        description: Optional URL to avatar image
        type: string
      email:
        description: Optional email address
        type: string
      name:
        description: Name of the contact
        type: string
      notes:
        description: Optional private notes
        type: string
      phone:
        description: Optional phone number
        type: string
    required:
    - name
    type: object
  dto.CreateDebtRequest:
    properties:
      account_id:
        description: ID of the account linked to the debt (as string)
        type: string
      contact_id:
        description: Optional ID of an existing contact
        type: string
      contact_name:
        description: Name of the contact if not an existing one
        type: string
      create_transaction:
        description: Whether to automatically create a transaction for this debt
        type: boolean
      direction:
        allOf:
        - $ref: '#/definitions/entity.DebtDirection'
        description: Direction of money (lent/borrowed)
      due_date:
        description: Target date for full repayment (YYYY-MM-DD)
        type: string
      interest_rate:
        description: Annual interest rate (decimal string)
        type: string
      interest_rule:
        description: Description of how interest is calculated
        type: string
      name:
        description: Optional name or purpose of the debt
        type: string
      originating_transaction_id:
        description: Optional ID of the transaction that created this debt
        type: string
      principal:
        description: Original principal amount (decimal string)
        type: string
      start_date:
        description: Date the debt was initiated (YYYY-MM-DD)
        type: string
    required:
    - account_id
    - direction
    - due_date
    - principal
    - start_date
    type: object
  dto.CreateLineItemRequest:
    properties:
      amount:
        description: Amount allocated to this category (decimal string)
        type: string
      category_id:
        description: ID of the category for this line item
        type: string
      note:
        description: Optional memo for this line item
        type: string
      tag_ids:
        description: IDs of tags for this line item
        items:
          type: string
        type: array
    type: object
  dto.CreateRotatingSavingsGroupRequest:
    properties:
      account_id:
        description: ID of the account linked for contributions
        type: string
      contribution_amount:
        description: Amount per slot per cycle
        type: number
      cycle_frequency:
        allOf:
        - $ref: '#/definitions/entity.RotatingSavingsCycleFrequency'
        description: How often cycles occur (weekly/monthly)
      fixed_interest_amount:
        description: Optional fixed interest added to payout
        type: number
      member_count:
        description: Total number of members in the group
        type: integer
      name:
        description: Name of the group
        type: string
      start_date:
        description: Start date of the first cycle (YYYY-MM-DD)
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entity.RotatingSavingsStatus'
        description: Initial status of the group
      user_slots:
        description: Number of slots taken by the user
        type: integer
    type: object
  dto.CreateSavingsRequest:
    properties:
      auto_renew:
        description: Whether to auto-renew on maturity
        type: boolean
      interest_rate:
        description: Annual interest rate (decimal string)
        type: string
      maturity_date:
        description: Expected maturity date (YYYY-MM-DD)
        type: string
      name:
        description: Name of the savings goal
        type: string
      parent_account_id:
        description: ID of the source account for funding
        type: string
      principal:
        description: Initial deposit amount (decimal string)
        type: string
      savings_account_id:
        description: ID of the dedicated savings account
        type: string
      start_date:
        description: Start date (YYYY-MM-DD)
        type: string
      term_months:
        description: Duration in months
        type: integer
    type: object
  dto.CreateTagRequest:
    properties:
      color:
        description: UI color representation in hex
        type: string
      name_en:
        description: Name of the tag in English
        type: string
      name_vi:
        description: Name of the tag in Vietnamese
        type: string
    type: object
  dto.CreateTradeRequest:
    properties:
      fee_category_id:
        description: Category ID for the fee transaction
        type: string
      fee_description:
        description: Description for the fee transaction
        type: string
      fee_transaction_id:
        description: Optional ID of an existing fee transaction
        type: string
      fees:
        description: Total trading fees (decimal string)
        type: string
      note:
        description: Optional trade memo
        type: string
      occurred_at:
        description: Full occurrence timestamp
        type: string
      occurred_date:
        description: Date of the trade (YYYY-MM-DD)
        type: string
      occurred_time:
        description: Time of the trade (HH:MM:SS)
        type: string
      price:
        description: Price per share (decimal string)
        type: string
      principal_category_id:
        description: Category ID for the principal transaction
        type: string
      principal_description:
        description: Description for the principal transaction
        type: string
      provenance:
        description: Origin of the trade (e.g., "manual")
        type: string
      quantity:
        description: Number of shares traded (decimal string)
        type: string
      security_id:
        description: ID of the security being traded
        type: string
      side:
        allOf:
        - $ref: '#/definitions/entity.TradeSide'
        description: Buy or Sell
      tax_category_id:
        description: Category ID for the tax transaction
        type: string
      tax_description:
        description: Description for the tax transaction
        type: string
      tax_transaction_id:
        description: Optional ID of an existing tax transaction
        type: string
      taxes:
        description: Total trading taxes (decimal string)
        type: string
    type: object
  dto.CreateTransactionRequest:
    properties:
      account_id:
        description: Primary account (for income/expense)
        type: string
      amount:
        description: Total transaction amount
        type: string
      category_id:
        description: Primary category (if no line items)
        type: string
      description:
        description: Main transaction description
        type: string
      exchange_rate:
        description: Manual exchange rate for transfers
        type: string
      external_ref:
        description: Optional reference from external system
        type: string
      from_account_id:
        description: Source account (for transfers)
        type: string
      from_amount:
        description: Amount deducted (for transfers)
        type: string
      group_participants:
        description: Shared expense participants
        items:
          $ref: '#/definitions/dto.GroupParticipantInput'
        type: array
      lang:
        description: Preferred language for category names (enriched)
        type: string
      line_items:
        description: Detailed breakdown into categories
        items:
          $ref: '#/definitions/dto.CreateLineItemRequest'
        type: array
      occurred_at:
        description: Full timestamp string
        type: string
      occurred_date:
        description: Date (YYYY-MM-DD)
        type: string
      occurred_time:
        description: Time (HH:MM:SS)
        type: string
      owner_original_amount:
        description: The creator's share of a group expense
        type: string
      source:
        description: Source of the transaction (e.g., 'manual', 'import')
        type: string
      tag_ids:
        description: Primary tags (if no line items)
        items:
          type: string
        type: array
      to_account_id:
        description: Destination account (for transfers)
        type: string
      to_amount:
        description: Amount added (for transfers)
        type: string
      type:
        allOf:
        - $ref: '#/definitions/entity.TransactionType'
        description: Income, Expense, or Transfer
    type: object
  dto.DebtPaymentLinkResponse:
    properties:
      created_at:
        description: Timestamp when the link was created
        type: string
      debt_id:
        description: ID of the repaid debt
        type: string
      id:
        description: Unique link identifier
        type: string
      interest_paid:
        description: Interest amount paid in this transaction
        type: string
      principal_paid:
        description: Principal amount paid in this transaction
        type: string
      transaction_id:
        description: ID of the payment transaction
        type: string
    type: object
  dto.DebtPaymentRequest:
    properties:
      amount_paid:
        description: Total paid amount (decimal string)
        type: string
      interest_paid:
        description: Amount of interest covered by this payment
        type: string
      principal_paid:
        description: Amount of principal covered by this payment
        type: string
      transaction_id:
        description: ID of the transaction representing the payment
        type: string
    required:
    - transaction_id
    type: object
  dto.DebtRepayRequest:
    properties:
      account_id:
        description: Account to pay from
        type: string
      amount:
        description: Amount to pay
        type: string
      note:
        description: Optional note
        type: string
    required:
    - account_id
    - amount
    type: object
  dto.DebtResponse:
    properties:
      account_id:
        description: ID of the linked account
        type: string
      accrued_interest:
        description: Total interest accumulated so far
        type: string
      contact_avatar_url:
        description: Avatar URL of the contact (enriched)
        type: string
      contact_id:
        description: ID of the associated contact
        type: string
      contact_name:
        description: Name of the contact (enriched)
        type: string
      created_at:
        description: Timestamp when the record was created
        type: string
      currency:
        description: Currency of the debt (e.g., "VND")
        type: string
      direction:
        allOf:
        - $ref: '#/definitions/entity.DebtDirection'
        description: Lent or Borrowed
      due_date:
        description: Repayment due date
        type: string
      id:
        description: Unique debt identifier
        type: string
      interest_rate:
        description: Annual interest rate
        type: string
      interest_rule:
        description: Interest calculation details
        type: string
      name:
        description: Name or purpose of the debt
        type: string
      originating_transaction_id:
        description: ID of the transaction that created this debt
        type: string
      outstanding_principal:
        description: Remaining principal to be paid
        type: string
      principal:
        description: Original principal amount
        type: string
      start_date:
        description: Initiation date
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entity.DebtStatus'
        description: Current status of the debt
      user_id:
        description: ID of the user who owns the record
        type: string
    type: object
  dto.GroupParticipantInput:
    properties:
      original_amount:
        description: The amount they were originally responsible for
        type: string
      participant_name:
        description: Name of the person sharing the expense
        type: string
      share_amount:
        description: Their final calculated share after adjustments
        type: string
    type: object
  dto.HoldingResponse:
    properties:
      account_id:
        description: ID of the account
        type: string
      as_of:
        description: Timestamp of the market valuation
        type: string
      avg_cost:
        description: Average cost per share
        type: string
      cost_basis_total:
        description: Total cost of all shares in position
        type: string
      id:
        description: Unique identifier for the holding record
        type: string
      market_price:
        description: Current market price
        type: string
      market_value:
        description: Total market value of position
        type: string
      quantity:
        description: Total shares currently held
        type: string
      security_id:
        description: ID of the security held
        type: string
      unrealized_pnl:
        description: Paper profit/loss
        type: string
    type: object
  dto.InvestmentSettingsRequest:
    properties:
      fee_settings:
        additionalProperties: {}
        description: Configuration for trade fee calculations
        type: object
      tax_settings:
        additionalProperties: {}
        description: Configuration for trade tax calculations
        type: object
    type: object
  dto.InvestmentSettingsResponse:
    properties:
      fee_settings:
        additionalProperties: {}
        description: Configuration for trade fee calculations
        type: object
      tax_settings:
        additionalProperties: {}
        description: Configuration for trade tax calculations
        type: object
    type: object
  dto.MarketSyncRequest:
    properties:
      force:
        description: Whether to force a fresh fetch
        type: string
      full:
        description: Whether to perform a full historical sync
        type: boolean
      include_events:
        description: Whether to sync event data for all securities
        type: boolean
      include_prices:
        description: Whether to sync price data for all securities
        type: boolean
    type: object
  dto.MediaResponse:
    properties:
      key:
        description: Unique storage key (e.g., S3 path)
        type: string
      size:
        description: File size in bytes
        type: integer
      updated_at:
        description: Last modified timestamp
        type: string
      url:
        description: Presigned or public access URL
        type: string
    type: object
  dto.PatchAccountRequest:
    properties:
      name:
        description: New name for the account
        type: string
      settings:
        allOf:
        - $ref: '#/definitions/dto.AccountSettingsRequest'
        description: Updated specialized settings
      status:
        description: New status (e.g., "active", "closed")
        type: string
    type: object
  dto.PatchSavingsRequest:
    properties:
      auto_renew:
        description: New auto-renew setting
        type: boolean
      interest_rate:
        description: New interest rate
        type: string
      maturity_date:
        description: New maturity date
        type: string
      name:
        description: New goal name
        type: string
      principal:
        description: New principal amount
        type: string
      savings_account_id:
        description: New savings account ID
        type: string
      status:
        allOf:
        - $ref: '#/definitions/entity.AccountStatus'
        description: New status (active/matured/closed)
      term_months:
        description: New duration
        type: integer
    type: object
  dto.RealizedPNLReport:
    properties:
      items:
        description: PnL breakdown per security
        items:
          $ref: '#/definitions/dto.RealizedPNLReportItem'
        type: array
      total_gross:
        description: Overall gross profit/loss
        type: string
      total_net:
        description: Overall net profit/loss
        type: string
    type: object
  dto.RealizedPNLReportItem:
    properties:
      cost_basis:
        description: Original cost of sold shares
        type: string
      dividend_gain:
        description: Gain from dividends
        type: string
      fees:
        description: Total fees associated with the sales
        type: string
      gross_realized_gain:
        description: Total gain before fees and taxes
        type: string
      net_pnl:
        description: Final profit/loss after fees and taxes
        type: string
      proceeds:
        description: Total sale proceeds
        type: string
      security_id:
        description: ID of the security
        type: string
      symbol:
        description: Security ticker
        type: string
      taxes:
        description: Total taxes associated with the sales
        type: string
      trade_gain:
        description: Gain from price appreciation
        type: string
    type: object
  dto.RefreshEventRequest:
    properties:
      force:
        description: Whether to force a fresh fetch
        type: string
      security_id:
        description: ID of the security to refresh
        type: string
    type: object
  dto.RefreshPriceRequest:
    properties:
      force:
        description: Whether to ignore existing data and force a fresh fetch
        type: string
      from:
        description: Start date for the refresh (YYYY-MM-DD)
        type: string
      full:
        description: Whether to perform a full historical backfill
        type: string
      security_id:
        description: ID of the security to refresh
        type: string
      to:
        description: End date for the refresh (YYYY-MM-DD)
        type: string
    type: object
  dto.RefreshRequest:
    properties:
      refresh_token:
        description: The valid refresh token
        type: string
    required:
    - refresh_token
    type: object
  dto.RefreshSymbolsRequest:
    properties:
      force:
        description: Whether to force a fresh fetch
        type: string
      include_events:
        description: Whether to include event data in the refresh
        type: boolean
      include_prices:
        description: Whether to include price data in the refresh
        type: boolean
      symbols:
        description: List of ticker symbols to refresh
        items:
          type: string
        type: array
    type: object
  dto.RotatingSavingsAuditLogResponse:
    properties:
      action:
        allOf:
        - $ref: '#/definitions/entity.RotatingSavingsAuditAction'
        description: Type of action performed
      created_at:
        description: Event timestamp
        type: string
      details:
        additionalProperties: {}
        description: Detailed event data (old/new values)
        type: object
      group_id:
