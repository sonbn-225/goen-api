services:
  goen-api:
    container_name: ${CONTAINER_NAME:-goen-api}
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      - GOEN_ENV=development
      - TZ=${SUNFLOWER_TZ:-Asia/Ho_Chi_Minh}
      - PORT=${PORT:-8080}
      - MIGRATE_ON_START=${MIGRATE_ON_START:-true}
      - MIGRATION_DIR=${MIGRATION_DIR:-migrations}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_ACCESS_TTL_MINUTES=${JWT_ACCESS_TTL_MINUTES:-60}
      - DATABASE_URL=${DATABASE_URL:-}
      - REDIS_URL=${REDIS_URL:-}
      - MARKET_DATA_STATUS_URL=${MARKET_DATA_STATUS_URL:-http://goen-market-data:8090/status}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - SEAWEEDFS_ENDPOINT=${SEAWEEDFS_ENDPOINT:-sunflower-seaweedfs:8333}
      - SEAWEEDFS_ACCESS_KEY_ID=${SEAWEEDFS_ACCESS_KEY_ID:-your-s3-access-key}
      - SEAWEEDFS_SECRET_ACCESS_KEY=${SEAWEEDFS_SECRET_ACCESS_KEY:-your-s3-secret-key}
      - SEAWEEDFS_BUCKET=${SEAWEEDFS_BUCKET:-goen}
      - SEAWEEDFS_USE_SSL=${SEAWEEDFS_USE_SSL:-false}
      - SEAWEEDFS_PUBLIC_BASE_URL=${SEAWEEDFS_PUBLIC_BASE_URL:-}
    volumes:
      - .:/app
    networks:
      - traefik_network
      - sunflower_data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy_network}"
      - "traefik.http.routers.goen-api.rule=Host(`${GOEN_DOMAIN:-api.localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.goen-api.entrypoints=web"
      - "traefik.http.routers.goen-api.priority=10"
      - "traefik.http.services.goen-api.loadbalancer.server.port=8080"
    restart: unless-stopped

networks:
  traefik_network:
    name: ${TRAEFIK_NETWORK:-proxy_network}
    external: true
  sunflower_data:
    name: ${DATA_NETWORK:-sunflower-data}
    external: true
